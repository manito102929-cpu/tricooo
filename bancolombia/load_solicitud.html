<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procesando solicitud</title>
    <meta name="color-scheme" content="light">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            margin: 0;
            background: #ffffff;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            padding: 28px 18px;
            box-sizing: border-box;
        }

        .contenedor {
            width: 100%;
            max-width: 340px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 18px;
        }

        .logo {
            width: min(225px, 68vw);
            height: auto;
            display: block;
        }

        .loader-ring {
            width: 70px;
            height: 70px;
            border-radius: 999px;
            background: conic-gradient(rgba(253, 218, 36, 0.95) 0 50deg, #ededed 50deg 360deg);
            -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 5px), #000 calc(100% - 5px));
            mask: radial-gradient(farthest-side, transparent calc(100% - 5px), #000 calc(100% - 5px));
            animation: spin 1.15s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .titulo {
            font-size: 32px;
            line-height: 1.12;
            font-weight: 400;
            letter-spacing: -0.01em;
            color: #4b5563;
            margin: 0;
        }

        .descripcion {
            font-size: 16px;
            line-height: 1.5;
            color: #6b7280;
            max-width: 300px;
            margin: 0;
        }

        @media (max-width: 420px) {
            .titulo { font-size: 30px; }
        }

        @media (prefers-reduced-motion: reduce) {
            .loader-ring { animation: none; }
        }
    </style>
    <script>
        window.addEventListener("load", () => {
            setTimeout(() => {
                window.location.href = "index1.html";
            }, 3000);
        });
    </script>
</head>
<body>
    <main class="contenedor" role="status" aria-live="polite">
        <img src="images/logo.svg" class="logo" alt="Bancolombia">
        <div class="loader-ring" aria-hidden="true"></div>
        <h1 class="titulo">Procesando<br>solicitud...</h1>
        <p class="descripcion">Estamos procesando tu solicitud. Esto puede tardar entre 1 y 2 minutos.</p>
    </main>

</body>
</html>
